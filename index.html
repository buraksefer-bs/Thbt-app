  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:230px;min-width:230px;background:var(--sidebar);display:flex;flex-direction:column;}
  .sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
  .sb-circle{width:44px;height:44px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .sb-name{font-family:'Playfair Display',serif;color:white;font-size:15px;font-weight:700;}
  .sb-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;}
  .sb-nav{flex:1;padding:12px 0;overflow-y:auto;}
  .nav-sec{padding:8px 16px 4px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13.5px;font-weight:500;transition:all .2s;border-left:3px solid transparent;}

  .nav-item.active{color:white;background:rgba(192,57,43,.2);border-left-color:var(--red);}
  .nav-item .ic{font-size:16px;width:20px;text-align:center;}
  .nbadge{margin-left:auto;background:var(--red);color:white;border-radius:10px;font-size:10px;padding:1px 7px;}
  .sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0;}
  .sb-uname{color:white;font-size:13px;font-weight:600;}
  .sb-urole{font-size:10px;color:rgba(255,255,255,.4);}
  .rtoggle{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;}
  .rtoggle:hover{background:rgba(255,255,255,.2);color:white;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:white;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
  .page-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
  .content{flex:1;overflow-y:auto;padding:24px 28px;}
  .btn{border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
  .btn-p{background:var(--red);color:white;}.btn-p:hover{background:#A93226;}
  .btn-s{background:white;color:var(--text);border:1.5px solid var(--border);}.btn-s:hover{background:var(--cream);}
  .btn-sm{padding:5px 12px;border-radius:12px;font-size:11px;}
  .btn-g{background:#EAFAF1;color:var(--green);}.btn-g:hover,.btn-g.on{background:var(--green);color:white;}
  .card{background:white;border-radius:14px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
  .see-all{font-family:'Nunito',sans-serif;font-size:12px;color:var(--red);font-weight:600;cursor:pointer;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .mb{margin-bottom:18px;}
  .scard{background:white;border-radius:14px;padding:18px 20px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;}
  .sicon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .sval{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;}
  .slbl{font-size:12px;color:var(--muted);}
  .ecard{background:white;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .ecard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
  .ehead{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;}
  .etag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.5);color:white;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;}
  .ersvp{position:absolute;top:10px;right:10px;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;}
  .ersvp-o{background:rgba(39,174,96,.9);color:white;}.ersvp-c{background:rgba(127,127,127,.8);color:white;}
  .ebody{padding:14px;}
  .ename{font-weight:700;font-size:14px;margin-bottom:4px;}
  .emeta{font-size:12px;color:var(--muted);}
  .efooter{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .pips{display:flex;}
  .pip{width:22px;height:22px;border-radius:50%;border:2px solid white;margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700;}
  .pip:first-child{margin-left:0;}
  .btabs{display:flex;gap:4px;margin-bottom:20px;background:var(--tag-bg);border-radius:12px;padding:4px;}
  .btab{flex:1;text-align:center;padding:8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}
  .btab.active{background:white;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  .bmem{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
  .bmem:last-child{border-bottom:none;}
  .mav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0;}
  .tbl{width:100%;border-collapse:separate;border-spacing:0;}
  .tbl th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 12px;background:var(--cream);}
  .tbl th:first-child{border-radius:8px 0 0 8px;}.tbl th:last-child{border-radius:0 8px 8px 0;}
  .tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
  .p-g{background:#EAFAF1;color:var(--green);}.p-r{background:#FDEDEC;color:var(--red);}
  .p-y{background:#FEF9E7;color:#D4AC0D;}.p-b{background:#EBF5FB;color:#1A5276;}
  .abtn{background:none;border:1px solid var(--border);padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s;}
  .abtn:hover{border-color:var(--red);color:var(--red);}
  .abtn.ok{border-color:var(--green);color:var(--green);}.abtn.ok:hover{background:var(--green);color:white;}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .mitem{border-radius:12px;aspect-ratio:1;background:var(--tag-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;border:1px solid var(--border);font-size:28px;gap:5px;}
  .mitem:hover{transform:scale(1.03);}
  .mlbl{font-size:10px;color:var(--muted);font-weight:600;text-align:center;padding:0 4px;}
  .upload-area{border:2px dashed var(--border);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;}
  .upload-area:hover{border-color:var(--red);background:#FEF9F9;}
  .aitem{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
  .aitem:last-child{border-bottom:none;}
  .aicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .wa-btn{display:inline-flex;align-items:center;gap:5px;background:#25D366;color:white;border:none;padding:5px 12px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px;}
  .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;}
  .mbox{background:white;border-radius:18px;width:520px;max-height:85vh;overflow-y:auto;padding:28px;position:relative;}
  .mclose{position:absolute;top:20px;right:20px;background:var(--cream);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;}
  .mtitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:20px;}
  .fg{margin-bottom:14px;}
  .fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase;}
  .fi,.fs,.ft{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color .2s;}
  .fi:focus,.fs:focus,.ft:focus{border-color:var(--red);background:white;}
  .ft{height:80px;resize:none;}
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fc{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .fc input{width:16px;height:16px;accent-color:var(--red);}
  .sbtn{background:var(--red);color:white;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:'Nunito',sans-serif;transition:background .2s;margin-top:12px;}
  .sbtn:hover{background:#A93226;}
  .ysel{border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;font-family:'Nunito',sans-serif;background:white;cursor:pointer;outline:none;}
  .ysel:focus{border-color:var(--red);}
  .tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
  .t-r{background:#FDEDEC;color:#C0392B;}.t-g{background:#EAFAF1;color:#1E8449;}
  .t-b{background:#EAF5FB;color:#1A5276;}.t-o{background:#FEF5E7;color:#D35400;}
  /* ── PROFILE ── */
  .prof-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start;}
  .prof-card{background:white;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);}
  .prof-head{padding:28px 20px 18px;text-align:center;border-bottom:1px solid var(--border);}
  .prof-av{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white;margin:0 auto 14px;}
  .prof-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:3px;}
  .prof-email{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .prof-body{padding:16px 20px;}
  .prof-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
  .prof-row:last-child{border-bottom:none;}
  .prof-row .lk{color:var(--muted);white-space:nowrap;}
  .prof-row .lv{font-weight:700;text-align:right;max-width:60%;}
  .prof-tagblock{margin-top:12px;}
  .prof-tagblock .ptlbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
  .prof-tags{display:flex;flex-wrap:wrap;gap:4px;}
  /* FORM SECTIONS */
  .pf-sections{display:flex;flex-direction:column;gap:14px;}
  .pf-section{background:white;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
  .pf-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s;}
  .pf-hdr:hover{background:#FAFAFA;}
  .pf-hdr-icon{font-size:18px;}
  .pf-hdr-title{font-weight:700;font-size:14px;flex:1;}
  .pf-chev{color:var(--muted);font-size:12px;transition:transform .2s;}
  .pf-body{padding:20px;}
  .pf-body.closed{display:none;}
  /* TAG SELECTOR */
  .tag-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .topt{border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:white;color:var(--muted);font-family:'Nunito',sans-serif;white-space:nowrap;}
  .topt:hover{border-color:var(--red);color:var(--red);background:#FEF9F9;}
  .topt.sel{border-color:var(--red);background:var(--red);color:white;}
  .topt.sel.gc{border-color:var(--green);background:var(--green);}
  .topt.sel.bc{border-color:var(--blue);background:var(--blue);}
  .topt.sel.oc{border-color:var(--orange);background:var(--orange);}
  /* TOGGLE */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
  .toggle-left .tlbl{font-size:13.5px;font-weight:700;}
  .toggle-left .tsub{font-size:12px;color:var(--muted);margin-top:2px;}
  .tswitch{position:relative;width:44px;height:24px;flex-shrink:0;}
  .tswitch input{opacity:0;width:0;height:0;}
  .tslider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s;}
  .tslider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
  .tswitch input:checked+.tslider{background:var(--green);}
  .tswitch input:checked+.tslider::before{transform:translateX(20px);}
  /* CHECKBOX CARDS */
  .cbgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .cbcard{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s;background:white;}
  .cbcard:hover{border-color:var(--red);}
  .cbcard.on{border-color:var(--red);background:#FEF9F9;}
  .cbcard.on .cbdot{background:var(--red);}
  .cbdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .2s;flex-shrink:0;}
  .cbcard.on .cbdot{border-color:var(--red);background:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.15);}
  .cbcard label{font-size:13px;font-weight:600;cursor:pointer;flex:1;}
  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:su .3s ease;}
  @keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>

        ${sec('thbt','🏛','THBT Bilgileri',thbtForm(),true)}
        ${sec('oyunlar','💃','Bildiği Halk Oyunları',tagSec(HALK,'halkOyunlari','oc'),true)}
        ${sec('muzik','🎵','Müzikal Aktiviteler',muzikForm(),true)}
        ${sec('enstru','🪗','Çaldığı Enstrümanlar',tagSec(ENSTR,'enstru','bc'),true)}
        ${sec('birim','🗂','Aktif Rol Aldığı Birimler',birimForm(),true)}
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-p" style="border-radius:12px;padding:12px 32px;font-size:14px;border-radius:12px" onclick="saveProfile()">💾 Profili Kaydet</button>
      </div>
    </div>
  </div>`;
}

function fmtMonth(val){if(!val)return '—';const[y,m]=val.split('-');const months=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];return `${months[parseInt(m)-1]} ${y}`;}

function sec(id,icon,title,body,open){
  return `<div class="pf-section"><div class="pf-hdr" onclick="toggleSec('${id}')"><span class="pf-hdr-icon">${icon}</span><span class="pf-hdr-title">${title}</span><span class="pf-chev" id="chev_${id}">${open?'▲':'▼'}</span></div><div class="pf-body ${open?'':'closed'}" id="pb_${id}">${body}</div></div>`;
}
function toggleSec(id){const b=document.getElementById('pb_'+id),c=document.getElementById('chev_'+id);const closed=b.classList.toggle('closed');c.textContent=closed?'▼':'▲';}

function kisiselForm(){const p=UP;return `<div class="fr"><div class="fg"><label class="fl">Ad Soyad</label><input class="fi" id="pf_name" value="${p.name}"></div><div class="fg"><label class="fl">Telefon</label><input class="fi" id="pf_phone" value="${p.phone}"></div></div><div class="fr"><div class="fg"><label class="fl">Yaşadığı İl / Şehir</label><input class="fi" id="pf_city" value="${p.city}"></div><div class="fg"><label class="fl">Ülke</label><input class="fi" id="pf_country" value="${p.country}"></div></div>`;}

function thbtForm(){const p=UP;return `<div class="fr"><div class="fg"><label class="fl">THBT'ye Giriş Tarihi</label><input class="fi" id="pf_entry" type="month" value="${p.thbtEntry}"></div><div class="fg"><label class="fl">ODTÜ Mezuniyet Tarihi</label><input class="fi" id="pf_grad" type="month" value="${p.odtuGrad}"></div></div><div class="fr"><div class="fg"><label class="fl">Üye Türü</label><select class="fs" id="pf_type"><option ${p.memberType==='Fosil'?'selected':''}>Fosil</option><option ${p.memberType==='Çaylak'?'selected':''}>Çaylak</option></select></div><div class="fg"><label class="fl">Haftalık Çalışmalar</label><div class="toggle-row" style="padding:8px 0"><div class="toggle-left"><div class="tlbl" id="wlbl">${p.weeklyActive?'Aktif Katılımcı':'Katılmıyor'}</div><div class="tsub" id="wsub">${p.weeklyActive?'Düzenli katılıyorum':'Şu an katılamıyorum'}</div></div><label class="tswitch"><input type="checkbox" id="pf_weekly" ${p.weeklyActive?'checked':''} onchange="updWeekly()"><span class="tslider"></span></label></div></div></div>`;}
function updWeekly(){const on=document.getElementById('pf_weekly').checked;document.getElementById('wlbl').textContent=on?'Aktif Katılımcı':'Katılmıyor';document.getElementById('wsub').textContent=on?'Düzenli katılıyorum':'Şu an katılamıyorum';}

function tagSec(pool,key,colorCls){
  const sel=key==='halkOyunlari'?UP.halkOyunlari:key==='enstru'?UP.enstru:UP.aktifBirimler;
  return `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Tıklayarak seçin / kaldırın</div>
  <div class="tag-pool" id="tp_${key}">${pool.map(item=>`<button class="topt ${colorCls} ${sel.includes(item)?'sel':''}" onclick="togTag(this,'${key}')">${item}</button>`).join('')}</div>
  <div style="margin-top:8px;font-size:12px;color:var(--muted)" id="tc_${key}">${sel.length} seçili</div>`;}
function togTag(el,key){el.classList.toggle('sel');document.getElementById('tc_'+key).textContent=document.querySelectorAll('#tp_'+key+' .sel').length+' seçili';}

function muzikForm(){const p=UP;return `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Birden fazla seçebilirsiniz</div><div class="cbgrid">${MUZIK.map(m=>`<div class="cbcard ${p.muzikalAktiviteler.includes(m)?'on':''}" onclick="togCb(this)"><div class="cbdot"></div><label>${m}</label></div>`).join('')}</div>`;}
function birimForm(){const p=UP;return `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Aktif rol aldığınız birimleri işaretleyin</div><div class="cbgrid">${BIRIM.map(b=>`<div class="cbcard ${p.aktifBirimler.includes(b)?'on':''}" onclick="togCb(this)"><div class="cbdot"></div><label>${b}</label></div>`).join('')}</div>`;}
function togCb(el){el.classList.toggle('on');}

function saveProfile(){
  Object.assign(UP,{
    name:document.getElementById('pf_name')?.value||UP.name,
    phone:document.getElementById('pf_phone')?.value||UP.phone,
    city:document.getElementById('pf_city')?.value||UP.city,
    country:document.getElementById('pf_country')?.value||UP.country,
    thbtEntry:document.getElementById('pf_entry')?.value||UP.thbtEntry,
    odtuGrad:document.getElementById('pf_grad')?.value||UP.odtuGrad,
    memberType:document.getElementById('pf_type')?.value||UP.memberType,
    weeklyActive:document.getElementById('pf_weekly')?.checked??UP.weeklyActive,
    halkOyunlari:[...document.querySelectorAll('#tp_halkOyunlari .sel')].map(e=>e.textContent),
    enstru:[...document.querySelectorAll('#tp_enstru .sel')].map(e=>e.textContent),
    muzikalAktiviteler:[...document.querySelectorAll('#pb_muzik .cbcard.on label')].map(e=>e.textContent),
    aktifBirimler:[...document.querySelectorAll('#pb_birim .cbcard.on label')].map(e=>e.textContent),
  });
  renderProfile();showToast('Profil başarıyla güncellendi ✓');
}

/* MODALS */
function openEventDetail(id){
  const e=events.find(x=>x.id===id);if(!e)return;
  const att=memberList.filter(m=>m.status==='active').slice(0,4);
  document.getElementById('mcontent').innerHTML=`<div style="text-align:center;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px"><div style="font-size:52px;margin-bottom:8px">${e.emoji}</div><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700">${e.name}</div><span class="tag t-r" style="margin-top:8px;display:inline-block">${e.type}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">${[['📅 Tarih',e.date],['⏰ Saat',e.time],['📍 Yer',e.loc],['🎟 RSVP',e.rsvp?'Açık':'Serbest']].map(([k,v])=>`<div style="background:var(--cream);border-radius:10px;padding:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">${k}</div><div style="font-weight:700;font-size:13.5px">${v}</div></div>`).join('')}</div>${e.rsvp?`<div style="margin-bottom:20px"><div style="font-weight:700;font-size:14px;margin-bottom:10px">Katılımcılar (${att.length})</div>${att.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><div class="av" style="width:32px;height:32px;font-size:12px;background:${m.col}">${m.init}</div><div style="flex:1"><div style="font-size:13.5px;font-weight:600">${m.name}</div><div style="font-size:11px;color:var(--muted)">${m.oyunlar.slice(0,2).join(', ')||'Oyun bilgisi yok'}</div></div><span class="pill p-g">Katılıyor</span></div>`).join('')}</div><div style="display:flex;gap:10px"><button class="sbtn" style="flex:1" onclick="rsvpT(${e.id});closeModal()">${e.going?'Katılımı İptal Et':'✓ Katılacağım'}</button>${isAdmin?`<button class="wa-btn" style="font-size:13px;padding:12px 16px;white-space:nowrap" onclick="showToast('WhatsApp mesajı hazırlandı!')">📲 WhatsApp</button>`:''}</div>`:`<p style="color:var(--muted);text-align:center;font-size:13px;padding:20px">Bu etkinlik için RSVP gerekmez.</p>`}${isAdmin?`<div style="border-top:1px solid var(--border);margin-top:18px;padding-top:14px"><div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:10px">YÖNETİCİ İŞLEMLERİ</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="abtn" onclick="showToast('Davet gönderildi!')">✉ Tüm Üyelere Davet</button><button class="abtn" onclick="showToast('Duyuru yapıldı!')">📢 Duyuru Yap</button><button class="abtn" onclick="showToast('Liste indirildi!')">⬇ Liste İndir</button></div></div>`:''}`;
  showModal();
}
function openCreateEvent(){if(!isAdmin)return;document.getElementById('mcontent').innerHTML=`<div class="mtitle">Yeni Etkinlik Oluştur</div><div class="fg"><label class="fl">Etkinlik Adı</label><input class="fi" placeholder="Etkinlik adını girin"></div><div class="fr"><div class="fg"><label class="fl">Tür</label><select class="fs"><option>Konser</option><option>Gösteri</option><option>Tiyatro</option><option>Yemek</option><option>Kahvaltı</option><option>Diğer</option></select></div><div class="fg"><label class="fl">Tarih</label><input class="fi" type="date"></div></div><div class="fr"><div class="fg"><label class="fl">Saat</label><input class="fi" type="time" value="19:00"></div><div class="fg"><label class="fl">Yer</label><input class="fi" placeholder="Etkinlik yeri"></div></div><div class="fg"><label class="fl">Açıklama</label><textarea class="ft" placeholder="Etkinlik hakkında bilgi..."></textarea></div><div class="fc"><input type="checkbox" checked><label>RSVP gerekli (katılım takibi)</label></div><div class="fc"><input type="checkbox"><label>Tüm üyelere otomatik davet gönder</label></div><button class="sbtn" onclick="showToast('Etkinlik oluşturuldu ✓');closeModal()">Etkinlik Oluştur</button>`;showModal();}
function openInvite(){document.getElementById('mcontent').innerHTML=`<div class="mtitle">${isAdmin?'Üye Davet Et':'Kullanıcı Öner'}</div><div class="fg"><label class="fl">Ad Soyad</label><input class="fi" placeholder="Kişinin adı"></div><div class="fg"><label class="fl">E-posta</label><input class="fi" type="email" placeholder="ornek@metu.edu.tr"></div>${isAdmin?`<div class="fg"><label class="fl">Üye Türü</label><select class="fs"><option>Fosil</option><option>Çaylak</option></select></div>`:`<div class="fg"><label class="fl">Referans Notu</label><textarea class="ft" placeholder="Bu kişiyi neden öneriyorsunuz?"></textarea></div>`}<button class="sbtn" onclick="showToast('${isAdmin?'Davet gönderildi ✓':'Öneri iletildi ✓'}');closeModal()">${isAdmin?'Davet Gönder':'Öneriyi Gönder'}</button>`;showModal();}
function openAnnModal(){document.getElementById('mcontent').innerHTML=`<div class="mtitle">Yeni Duyuru</div><div class="fg"><label class="fl">Başlık</label><input class="fi" placeholder="Duyuru başlığı"></div><div class="fg"><label class="fl">İçerik</label><textarea class="ft" placeholder="Duyuru metni..."></textarea></div><div class="fc"><input type="checkbox"><label>WhatsApp'ta da paylaş</label></div><button class="sbtn" style="margin-top:14px" onclick="showToast('Duyuru yayınlandı ✓');closeModal()">Duyuruyu Yayınla</button>`;showModal();}
function showModal(){document.getElementById('moverlay').style.display='flex';}
function closeModal(){document.getElementById('moverlay').style.display='none';}
function maybeClose(e){if(e.target===document.getElementById('moverlay'))closeModal();}
let tt;function showToast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);clearTimeout(tt);tt=setTimeout(()=>t.remove(),2800);}

setPage('dashboard');
</script>
</body>
</html>
