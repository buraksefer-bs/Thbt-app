<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THBT Mezunlar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#7986CB;
  --dark:#1C1C1C;--cream:#FBF8F3;--border:#EDE8DF;--text:#2C2C2C;
  --muted:#888;--shadow:0 2px 12px rgba(0,0,0,.08);--tag-bg:#F5EFE6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sb{width:230px;min-width:230px;background:var(--dark);display:flex;flex-direction:column;z-index:50;}
.sb-logo{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;}
.sb-circle{width:42px;height:42px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-sec{padding:8px 16px 4px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13.5px;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{color:white;background:rgba(255,255,255,.05);}
.nav-item.active{color:white;background:rgba(192,57,43,.2);border-left-color:var(--red);}
.nav-item .ic{font-size:16px;width:20px;text-align:center;}
.nbadge{margin-left:auto;background:var(--red);color:white;border-radius:10px;font-size:10px;padding:1px 7px;}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-uname{color:white;font-size:13px;font-weight:600;}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);}
.rtoggle{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;}
.rtoggle:hover{background:rgba(255,255,255,.2);color:white;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.content{flex:1;overflow-y:auto;padding:18px 20px;}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark);z-index:200;}
.bnav-inner{display:flex;border-top:1px solid rgba(255,255,255,.1);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 12px;cursor:pointer;color:rgba(255,255,255,.5);font-size:10px;font-weight:600;transition:color .2s;position:relative;}
.bn.active{color:var(--red);}
.bn .bni{font-size:20px;line-height:1;}
.bn-badge{position:absolute;top:5px;right:calc(50% - 16px);background:var(--red);color:white;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700;}

/* SHARED */
.btn{border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
.btn-p{background:var(--red);color:white;} .btn-p:hover{background:#A93226;}
.btn-s{background:white;color:var(--text);border:1.5px solid var(--border);} .btn-s:hover{background:var(--cream);}
.btn-sm{padding:5px 12px;border-radius:12px;font-size:11px;}
.btn-g{background:#EAFAF1;color:var(--green);} .btn-g:hover,.btn-g.on{background:var(--green);color:white;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0;}
.card{background:white;border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);}
.card-hd{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.see-all{font-family:'Nunito',sans-serif;font-size:12px;color:var(--red);font-weight:600;cursor:pointer;white-space:nowrap;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.mb{margin-bottom:16px;}
.pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;}
.p-g{background:#EAFAF1;color:var(--green);} .p-r{background:#FDEDEC;color:var(--red);}
.p-y{background:#FEF9E7;color:#D4AC0D;} .p-b{background:#EBF5FB;color:#1A5276;}
.tag{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.t-r{background:#FDEDEC;color:#C0392B;} .t-g{background:#EAFAF1;color:#1E8449;}
.t-b{background:#EAF5FB;color:#1A5276;} .t-o{background:#FEF5E7;color:#D35400;}
.t-teal{background:#E8F8F5;color:#148F77;} .t-p{background:#F4ECF7;color:#7D3C98;}
.abtn{background:none;border:1px solid var(--border);padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s;}
.abtn:hover{border-color:var(--red);color:var(--red);}
.abtn.ok{border-color:var(--green);color:var(--green);} .abtn.ok:hover{background:var(--green);color:white;}

/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 12px;background:var(--cream);white-space:nowrap;}
.tbl th:first-child{border-radius:8px 0 0 8px;} .tbl th:last-child{border-radius:0 8px 8px 0;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbox{background:white;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;position:relative;}
.mclose{position:absolute;top:16px;right:16px;background:var(--cream);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;}
.mtitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase;}
.fi,.fs,.ft{width:100%;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color .2s;}
input[type="date"],input[type="month"],input[type="time"]{width:100%;min-width:0;appearance:none;-webkit-appearance:none;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--red);background:white;}
.ft{height:80px;resize:none;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0;}
.fr2 > *{min-width:0;}
.fc{display:flex;align-items:center;gap:8px;margin-top:6px;}
.fc input{width:16px;height:16px;accent-color:var(--red);}
.sbtn{background:var(--red);color:white;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:'Nunito',sans-serif;transition:background .2s;margin-top:12px;}
.sbtn:hover{background:#A93226;}

/* PENDING ANNOUNCEMENT */
.pann{border-radius:14px;overflow:hidden;margin-bottom:16px;border:1.5px solid var(--red);box-shadow:0 4px 16px rgba(192,57,43,.15);}
.pann-top{background:linear-gradient(135deg,var(--red),#8B0000);padding:14px 18px;display:flex;align-items:center;gap:12px;}
.pann-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7);}
.pann-title{font-family:'Playfair Display',serif;font-size:16px;color:white;font-weight:700;margin-top:2px;}
.pann-body{background:white;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.pann-text{flex:1;min-width:160px;font-size:13px;color:var(--muted);line-height:1.5;}
.pann-actions{display:flex;gap:8px;}
.pann-btn{border:none;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.pann-yes{background:var(--green);color:white;} .pann-no{background:var(--cream);color:var(--text);border:1.5px solid var(--border);}

/* PHOTO CAROUSEL */
.carousel{position:relative;border-radius:14px;overflow:hidden;margin-bottom:16px;cursor:pointer;}
.c-track{display:flex;height:200px;transition:transform .5s ease;}
.c-slide{min-width:100%;position:relative;display:flex;align-items:center;justify-content:center;font-size:64px;}
.c-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:20px 16px 12px;color:white;pointer-events:none;}
.c-evname{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.c-meta{font-size:11px;opacity:.85;display:flex;gap:10px;flex-wrap:wrap;}
.c-dots{position:absolute;bottom:10px;right:12px;display:flex;gap:5px;}
.c-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .3s;}
.c-dot.on{background:white;width:18px;border-radius:3px;}
.c-arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.35);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.c-arr:hover{background:rgba(0,0,0,.65);}
.c-arr.l{left:10px;} .c-arr.r{right:10px;}

/* MEMBER STRIP */
.ms{display:flex;align-items:center;gap:14px;background:white;border-radius:14px;padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;}
.ms-num{flex-shrink:0;text-align:center;padding-right:14px;border-right:1.5px solid var(--border);}
.ms-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--red);line-height:1;}
.ms-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.ms-list{flex:1;display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;}
.ms-list::-webkit-scrollbar{height:0;}
.ms-card{display:flex;align-items:center;gap:8px;flex-shrink:0;padding:7px 10px;border-radius:10px;background:var(--cream);border:1px solid var(--border);}
.ms-name{font-weight:700;font-size:12.5px;line-height:1.2;}
.ms-info{font-size:10.5px;color:var(--muted);margin-top:2px;}
.ms-new{font-size:9px;font-weight:700;background:var(--green);color:white;padding:1px 5px;border-radius:6px;margin-left:3px;vertical-align:middle;}

/* EVENT CARDS */
.ecard{background:white;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.ecard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.ehead{height:110px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--tag-bg);}
.ehead img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.ehead-em{font-size:44px;z-index:1;position:relative;}
.etag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:white;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;z-index:2;}
.ersvp{position:absolute;top:8px;right:8px;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;z-index:2;}
.eo{background:rgba(39,174,96,.9);color:white;} .ec{background:rgba(100,100,100,.8);color:white;}
.ebody{padding:13px;}
.ename{font-weight:700;font-size:14px;margin-bottom:4px;}
.emeta{font-size:12px;color:var(--muted);margin-top:2px;}
.efooter{padding:9px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pips{display:flex;}
.pip{width:22px;height:22px;border-radius:50%;border:2px solid white;margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700;}
.pip:first-child{margin-left:0;}

/* CALENDAR STRIP */
.cal-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.cal-strip::-webkit-scrollbar{height:4px;}
.cal-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.cal-mo{min-width:68px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.cal-mo:hover{border-color:var(--red);}
.cal-mo.has{border-color:var(--red);}
.cal-hd{background:var(--border);color:var(--muted);font-size:10px;font-weight:700;text-align:center;padding:4px;}
.cal-mo.has .cal-hd{background:var(--red);color:white;}
.cal-bd{padding:6px;text-align:center;min-height:30px;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin:2px;}

/* SESSIONS */
.sess{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.sess:last-child{border-bottom:none;}
.sess-day{width:58px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:12px;font-weight:700;flex-shrink:0;line-height:1;}
.sess-name{font-weight:700;font-size:13.5px;}
.sess-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.sess-city{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--tag-bg);color:var(--muted);}

/* ANNOUNCEMENTS */
.ai{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--border);}
.ai:last-child{border-bottom:none;}
.aico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.wa-btn{display:inline-flex;align-items:center;gap:5px;background:#25D366;color:white;border:none;padding:5px 12px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:7px;}

/* TALEP */
.talep{background:white;border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px;display:flex;gap:12px;box-shadow:var(--shadow);}
.talep-icon{font-size:24px;flex-shrink:0;}
.talep-title{font-weight:700;font-size:14px;margin-bottom:3px;}
.talep-body{font-size:12.5px;color:var(--muted);line-height:1.5;}
.talep-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.con-btn{border:1.5px solid var(--border);background:white;padding:4px 12px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.con-btn:hover{border-color:var(--red);color:var(--red);}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--tag-bg);border-radius:12px;padding:4px;margin-bottom:16px;}
.tab{flex:1;text-align:center;padding:8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}
.tab.active{background:white;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* BOARD */
.btab-wrap{display:flex;gap:4px;background:var(--tag-bg);border-radius:12px;padding:4px;margin-bottom:16px;}
.btab{flex:1;text-align:center;padding:8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}
.btab.active{background:white;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.aga-card{border-radius:16px;padding:20px 22px;color:white;margin-bottom:14px;cursor:pointer;transition:all .2s;user-select:none;}
.aga-card:hover{opacity:.93;}
.aga-period{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:4px;}
.aga-title{font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.6;text-transform:uppercase;margin-bottom:6px;}
.aga-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.aga-meta{font-size:13px;opacity:.85;display:flex;flex-wrap:wrap;gap:10px;}
.aga-expand{margin-top:12px;font-size:12px;opacity:.7;display:flex;align-items:center;gap:5px;}
.maraba-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.maraba-row:last-child{border-bottom:none;}
.maraba-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:white;flex-shrink:0;}
.maraba-name{font-weight:700;font-size:13.5px;}
.maraba-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.maraba-role{display:inline-block;background:var(--tag-bg);color:var(--muted);border-radius:8px;font-size:11px;font-weight:700;padding:2px 8px;margin-left:auto;flex-shrink:0;white-space:nowrap;}
.diger-accordion{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;}
.diger-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-weight:700;font-size:13px;background:white;transition:background .15s;}
.diger-hdr:hover{background:var(--cream);}
.diger-body{padding:10px 16px 14px;border-top:1px solid var(--border);background:white;}
.diger-body.cl{display:none;}
.diger-member{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.diger-member:last-child{border-bottom:none;}
.past-aga{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.past-aga-hdr{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;background:white;transition:background .15s;}
.past-aga-hdr:hover{background:var(--cream);}
.past-aga-body{padding:14px 16px;border-top:1px solid var(--border);background:#FAFAFA;}
.past-aga-body.cl{display:none;}
.almanak-btn{display:inline-flex;align-items:center;gap:6px;background:var(--dark);color:white;border:none;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;text-decoration:none;transition:background .2s;}
.almanak-btn:hover{background:#333;}
.da-card{background:linear-gradient(135deg,var(--red),#7B241C);border-radius:14px;padding:20px;color:white;margin-bottom:16px;}
.da-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:6px;}
.da-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.da-meta{font-size:13px;opacity:.8;}
.da-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.da-tag{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.mb-row{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.mb-row:last-child{border-bottom:none;}
.mb-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}

/* MEMBER SEARCH & FILTER */
.mem-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.mem-search{flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;background:white;}
.mem-search:focus{border-color:var(--red);}
.mem-sel{border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-size:12px;font-family:'Nunito',sans-serif;background:white;cursor:pointer;outline:none;color:var(--text);}
.mem-sel:focus{border-color:var(--red);}
.sort-btn{border:1.5px solid var(--border);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;background:white;color:var(--muted);transition:all .15s;white-space:nowrap;}
.sort-btn.on{background:var(--dark);color:white;border-color:var(--dark);}

/* CITY MAP SIMPLE */
.city-map{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.city-bubble{display:flex;align-items:center;gap:7px;background:white;border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 8px;}
.city-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:10px;flex-shrink:0;}
.city-info .city-name{font-weight:700;font-size:12.5px;line-height:1.2;}
.city-info .city-count{font-size:11px;color:var(--muted);}

.recent-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.recent-row:last-child{border-bottom:none;}

/* INVITE WARNING */
.inv-warning{background:#FEF9E7;border:1.5px solid #F39C12;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#7D6608;margin-top:8px;display:none;}
.inv-warning.show{display:block;}

/* COPY LINK BTN */
.copy-btn{border:1.5px solid var(--border);background:white;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;margin-top:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.copy-btn:hover{border-color:var(--blue);color:var(--blue);}
.wa-big{background:#25D366;color:white;border:none;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;}
.wa-big:hover{background:#1EA352;}
.r-scroll::-webkit-scrollbar{height:4px;}
.r-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.r-card{min-width:148px;background:white;border-radius:12px;border:1px solid var(--border);padding:14px 12px;text-align:center;flex-shrink:0;box-shadow:var(--shadow);}
.r-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;margin:0 auto 8px;font-size:16px;}
.r-name{font-weight:700;font-size:13px;margin-bottom:3px;}
.r-date{font-size:11px;color:var(--muted);}
.r-tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:6px;}

/* WORLD MAP */
.map-wrap{position:relative;background:#EAF4FB;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.map-tip{position:absolute;background:var(--dark);color:white;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;display:none;z-index:10;white-space:nowrap;}

/* PROFILE */
.pf-layout{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:start;}
.pf-sec{background:white;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.pf-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.pf-hdr:hover{background:#FAFAFA;}
.pf-body{padding:18px;}
.pf-body.cl{display:none;}
.tag-pool{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
.topt{border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--muted);font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .15s;}
.topt:hover{border-color:var(--red);color:var(--red);}
.topt.sel{border-color:var(--red);background:var(--red);color:white;}
.topt.sel.gc{border-color:var(--green);background:var(--green);}
.topt.sel.bc{border-color:var(--blue);background:var(--blue);}
.topt.sel.oc{border-color:var(--orange);background:var(--orange);}
.cbgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.cbcard{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s;}
.cbcard:hover,.cbcard.on{border-color:var(--red);background:#FEF9F9;}
.cbdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);transition:all .2s;flex-shrink:0;}
.cbcard.on .cbdot{border-color:var(--red);background:var(--red);}
.cbcard label{font-size:13px;font-weight:600;cursor:pointer;flex:1;}
.tswitch{position:relative;width:44px;height:24px;flex-shrink:0;}
.tswitch input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s;}
.tslider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
.tswitch input:checked+.tslider{background:var(--green);}
.tswitch input:checked+.tslider::before{transform:translateX(20px);}

.ev-tabs{display:flex;gap:4px;background:var(--tag-bg);border-radius:12px;padding:4px;margin-bottom:16px;}
.ev-tab{flex:1;text-align:center;padding:8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}
.ev-tab.active{background:white;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.ev-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.ev-filter-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.fsel{border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;font-family:'Nunito',sans-serif;background:white;cursor:pointer;outline:none;color:var(--text);}
.fsel:focus{border-color:var(--red);}
.fpill{border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--muted);font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .15s;}
.fpill:hover{border-color:var(--red);color:var(--red);}
.fpill.on{background:var(--red);border-color:var(--red);color:white;}
.fpill.on.fc-fosil{background:#C0392B;border-color:#C0392B;}
.fpill.on.fc-caylak{background:#27AE60;border-color:#27AE60;}
.past-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:white;border-radius:12px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.past-item:hover{border-color:var(--red);transform:translateX(2px);}
.past-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.past-info{flex:1;min-width:0;}
.past-name{font-weight:700;font-size:14px;margin-bottom:3px;}
.past-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.past-badges{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.att-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;}
.att-yes{background:#EAFAF1;color:var(--green);}
.att-no{background:#F5F5F5;color:var(--muted);}
.media-count{font-size:11px;color:var(--blue);font-weight:700;}

/* EVENT DETAIL MODAL EXTRAS */
.att-toggle{display:flex;gap:8px;margin-bottom:14px;}
.att-btn{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;text-align:center;transition:all .2s;}
.att-btn.yes{border-color:var(--green);color:var(--green);background:#EAFAF1;}
.att-btn.yes.on{background:var(--green);color:white;}
.att-btn.no{border-color:var(--border);color:var(--muted);}
.att-btn.no.on{background:#eee;border-color:#bbb;color:var(--dark);}
.media-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.mg-item{border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;gap:4px;border:1px solid var(--border);background:var(--cream);cursor:pointer;position:relative;}
.mg-item .mg-lbl{font-size:10px;color:var(--muted);font-weight:600;padding:0 4px;text-align:center;}

.upload-slot{border:2px dashed var(--border);border-radius:10px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;gap:4px;cursor:pointer;transition:all .2s;}
.upload-slot:hover{border-color:var(--red);background:#FEF9F9;}
.upload-slot .us-lbl{font-size:10px;color:var(--muted);font-weight:600;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* ROLE PICKER */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 16px;}
.role-btn{border:1.5px solid var(--border);border-radius:12px;padding:11px 10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;background:white;color:var(--text);text-align:center;transition:all .15s;}

.role-btn.picked{border-color:var(--red);background:var(--red);color:white;}

.mitem{border-radius:10px;aspect-ratio:1;background:var(--tag-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);font-size:26px;gap:5px;transition:transform .15s;}

.mlbl{font-size:10px;color:var(--muted);font-weight:600;text-align:center;padding:0 4px;}
.upload-area{border:2px dashed var(--border);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-area:hover{border-color:var(--red);background:#FEF9F9;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .3s ease;white-space:nowrap;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@media(min-width:769px){

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}

  .cbgrid{grid-template-columns:1fr;}
  .pf-layout{grid-template-columns:1fr;}
  .c-track{height:170px;}
}
@media(min-width:769px){

}

/* HELPERS */
function fmtM(v) {
  if (!v) return '-';
  var parts = v.split('-');
  var mn = ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];
  return mn[parseInt(parts[1]) - 1] + ' ' + parts[0];
}
function deptA(d) {
  if (!d) return '-';
  var map = {'Bilgisayar Muh.':'Bil.Muh.','Makine Muh.':'Mak.Muh.','Elektrik Muh.':'Elek.Muh.','Kimya Muh.':'Kim.Muh.','Insaat Muh.':'Ins.Muh.','Endustri Muh.':'End.Muh.','Mimarlik':'Mim.','Ul. Iliskiler':'UI.','Fizik':'Fiz.'};
  return map[d] || d.substring(0, 9);
}

/* NAV */
function toggleRole() {
  isAdmin = !isAdmin;
  document.getElementById('roleLabel').textContent = isAdmin ? 'Yonetici' : 'Uye';
  document.getElementById('sbAv').style.background = isAdmin ? 'var(--red)' : 'var(--blue)';
  document.getElementById('pendingBadge').style.display = isAdmin ? '' : 'none';
  go(curPage);
}

function go(page) {
  clearInterval(cTimer);
  curPage = page;
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.bn').forEach(function(el) { el.classList.remove('active'); });
  var navMap = {dashboard:0, events:1, ann:2, board:3, members:4, media:5, profile:6};
  var navItems = document.querySelectorAll('.nav-item');
  if (navItems[navMap[page]]) navItems[navMap[page]].classList.add('active');
  var bnEl = document.getElementById('bn-' + page);
  if (bnEl) bnEl.classList.add('active');
  var titles = {dashboard:'Ana Sayfa', events:'Etkinlikler', ann:'Duyurular ve Talepler', board:'Donem Agasi ve Marabalar', members:'Uyeler', media:'Medya ve Belgeler', profile:'Profilim'};
  document.getElementById('pageTitle').textContent = titles[page] || page;
  var fns = {dashboard:pgDashboard, events:pgEvents, ann:pgAnn, board:pgBoard, members:pgMembers, media:pgMedia, profile:pgProfile};
  if (fns[page]) fns[page]();
}

function setTop(h) { document.getElementById('topActs').innerHTML = h; }
function setMC(h) { document.getElementById('mc').innerHTML = h; }

/* CAROUSEL */
function cBuild() {
  var dots = '';
  var slides = '';
  for (var i = 0; i < photos.length; i++) {
    var p = photos[i];
    slides += '<div class="c-slide" style="background:linear-gradient(135deg,' + p.gr[0] + ',' + p.gr[1] + ')">' +
      '<span style="font-size:70px;opacity:.3;position:absolute">' + p.em + '</span>' +
      '<span style="font-size:62px;position:relative;z-index:1">' + p.em + '</span>' +
      '<div class="c-overlay">' +
        '<div class="c-evname">' + p.ev + '</div>' +
        '<div class="c-meta"><span>📍 ' + p.loc + '</span><span>📅 ' + p.dt + '</span></div>' +
      '</div>' +
    '</div>';
    dots += '<div class="c-dot' + (i === 0 ? ' on' : '') + '" onclick="cGo(' + i + ')"></div>';
  }
  return '<div class="carousel">' +
    '<div class="c-track" id="cTrack">' + slides + '</div>' +
    '<button class="c-arr l" onclick="cMove(-1)">&#8249;</button>' +
    '<button class="c-arr r" onclick="cMove(1)">&#8250;</button>' +
    '<div class="c-dots">' + dots + '</div>' +
  '</div>';
}
function cGo(idx) {
  cIdx = idx;
  var t = document.getElementById('cTrack');
  if (t) t.style.transform = 'translateX(-' + (idx * 100) + '%)';
  var dots = document.querySelectorAll('.c-dot');
  for (var i = 0; i < dots.length; i++) dots[i].classList.toggle('on', i === idx);
}
function cMove(d) { cGo((cIdx + d + photos.length) % photos.length); }
function cStart() {
  clearInterval(cTimer);
  cTimer = setInterval(function() { cMove(1); }, 3500);
}

/* DASHBOARD */
function pgDashboard() {
  setTop(isAdmin ? '<button class="btn btn-p btn-sm" onclick="openCreateEvent()">+ Etkinlik</button>' : '');
  var activeMems = members.filter(function(m) { return m.status === 'active'; });
  var recent = activeMems.slice().sort(function(a,b) { return b.thbtEntry.localeCompare(a.thbtEntry); }).slice(0, 3);
  var upcoming = events.filter(function(e) { return e.year === CURRENT_YEAR && e.month >= 4; }).slice(0, 3);
  var months = ['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];
  var evMonths = {};
  events.forEach(function(e) { if (!evMonths[e.month]) evMonths[e.month] = []; evMonths[e.month].push(e); });

  /* pending announcement */
  var pa = pendingAnn;
  var paHtml = '';
  if (pa && !pa.response) {
    paHtml = '<div class="pann">' +
      '<div class="pann-top"><span style="font-size:22px">🔔</span>' +
        '<div><div class="pann-label">' + pa.label + '</div><div class="pann-title">' + pa.title + '</div></div>' +
      '</div>' +
      '<div class="pann-body">' +
        '<div class="pann-text">📍 ' + pa.detail + '<br><span style="font-size:11px">⏰ ' + pa.deadline + '</span></div>' +
        '<div class="pann-actions">' +
          '<button class="pann-btn pann-yes" onclick="respondPA(\'evet\')">✓ Evet</button>' +
          '<button class="pann-btn pann-no" onclick="respondPA(\'hayir\')">✕ Hayir</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  } else if (pa && pa.response) {
    paHtml = '<div class="pann" style="opacity:.75">' +
      '<div class="pann-top" style="padding:10px 18px"><span style="font-size:18px">✓</span>' +
        '<div><div class="pann-label">Yanitlandi</div><div class="pann-title">' + pa.title + '</div></div>' +
      '</div>' +
      '<div class="pann-body">' +
        '<span class="pill ' + (pa.response === 'evet' ? 'p-g' : 'p-y') + '">' + (pa.response === 'evet' ? '✓ Katiliyorum' : '✕ Katilamiyorum') + '</span>' +
        '<span style="font-size:12px;color:var(--muted);margin-left:8px">Yanitiniz kaydedildi</span>' +
      '</div>' +
    '</div>';
  }

  /* member strip */
  var msHtml = '<div class="ms"><div class="ms-num"><div class="ms-val">' + activeMems.length + '</div><div class="ms-lbl">Aktif<br>Uye</div></div><div class="ms-list">';
  for (var i = 0; i < recent.length; i++) {
    var m = recent[i];
    msHtml += '<div class="ms-card">' +
      '<div class="av" style="width:32px;height:32px;background:' + m.col + '">' + m.init + '</div>' +
      '<div><div class="ms-name">' + m.name + (i === 0 ? '<span class="ms-new">YENİ</span>' : '') + '</div>' +
      '<div class="ms-info">' + fmtM(m.thbtEntry) + ' · ' + deptA(m.dept) + '</div></div>' +
    '</div>';
  }
  msHtml += '</div></div>';

  /* upcoming events */
  var evHtml = '';
  for (var i = 0; i < upcoming.length; i++) {
    var e = upcoming[i];
    evHtml += '<div class="ecard" onclick="openEvDetail(' + e.id + ')">' +
      '<div class="ehead" style="background:linear-gradient(135deg,' + e.cols[0] + '22,' + (e.cols[1]||e.cols[0]) + '33)">' +
        '<span class="ehead-em">' + e.em + '</span>' +
        '<span class="etag">' + e.type + '</span>' +
        (e.rsvp ? '<span class="ersvp eo">RSVP</span>' : '<span class="ersvp ec">Serbest</span>') +
      '</div>' +
      '<div class="ebody"><div class="ename">' + e.name + '</div>' +
        '<div class="emeta">📅 ' + e.date + ' · ⏰ ' + e.time + '</div>' +
        '<div class="emeta">📍 ' + e.loc + '</div>' +
      '</div>' +
      '<div class="efooter">' +
        '<div class="pips">' + e.pips.map(function(p,j){ return '<div class="pip" style="background:' + e.cols[j % e.cols.length] + '">' + p + '</div>'; }).join('') + '</div>' +
        (e.rsvp ? '<button class="btn btn-sm btn-g' + (e.going ? ' on' : '') + '" onclick="event.stopPropagation();rsvpT(' + e.id + ')">' + (e.going ? '✓' : 'Katil') + '</button>' : '') +
      '</div>' +
    '</div>';
  }

  /* calendar strip */
  var calHtml = '';
  for (var i = 0; i < months.length; i++) {
    var mi = i + 1;
    var evs = evMonths[mi] || [];
    var hasDots = evs.length > 0;
    var dots = evs.map(function() { return '<div class="cal-dot"></div>'; }).join('');
    calHtml += '<div class="cal-mo' + (hasDots ? ' has' : '') + '" onclick="go(\'events\')" title="' + evs.map(function(e){ return e.name; }).join(', ') + '">' +
      '<div class="cal-hd">' + months[i] + '</div>' +
      '<div class="cal-bd" style="min-height:28px">' + (hasDots ? dots : '<span style="color:#ccc">-</span>') + '</div>' +
    '</div>';
  }

  /* weekly sessions */
  var sessHtml = '';
  for (var i = 0; i < Math.min(weekly.length, 5); i++) {
    var s = weekly[i];
    sessHtml += '<div class="sess">' +
      '<div class="sess-day" style="background:' + s.col + '22;color:' + s.col + '">' +
        '<span>' + s.day + '</span><span style="font-size:10px;font-weight:700;opacity:.85">' + s.time + '</span>' +
      '</div>' +
      '<div style="flex:1"><div class="sess-name">' + s.ic + ' ' + s.name + '</div><div class="sess-meta">' + s.city + ' · ' + s.type + '</div></div>' +
      '<span class="sess-city">' + s.city + '</span>' +
    '</div>';
  }

  /* ann preview */
  var annHtml = '';
  for (var i = 0; i < announcements.length; i++) {
    var a = announcements[i];
    annHtml += '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">' +
      '<div class="aico" style="background:' + a.bg + '">' + a.icon + '</div>' +
      '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + a.title + '</div>' +
        '<div style="font-size:11.5px;color:var(--muted);margin-top:2px">' + a.date + '</div>' +
      '</div>' +
    '</div>';
  }

  setMC(
    paHtml +
    msHtml +
    cBuild() +
    '<div class="card mb"><div class="card-hd">Yaklasan Etkinlikler <span class="see-all" onclick="go(\'events\')">Tumunu Gor &rarr;</span></div>' +
      '<div class="g3 e-scroll">' + evHtml + '</div>' +
    '</div>' +
    '<div class="card mb"><div class="card-hd">📅 Yillik Etkinlik Takvimi <span class="see-all" onclick="go(\'events\')">Detay &rarr;</span></div>' +
      '<div class="cal-strip">' + calHtml + '</div>' +
    '</div>' +
    '<div class="g2">' +
      '<div class="card"><div class="card-hd">🗓 Haftalık Calismalar <span class="see-all" onclick="showAllSess()">Tumu &rarr;</span></div>' + sessHtml + '</div>' +
      '<div class="card"><div class="card-hd">📢 Son Duyurular <span class="see-all" onclick="go(\'ann\')">Tumu &rarr;</span></div>' + annHtml + '</div>' +
    '</div>'
  );
  cIdx = 0;
  setTimeout(cStart, 100);
}

function respondPA(ans) {
  pendingAnn.response = ans;
  pgDashboard();
  showToast(ans === 'evet' ? 'Katiliniz kaydedildi ✓' : 'Yanitiniz kaydedildi');
}

/* EVENTS */
function getEvById(id) {
  var all = events.concat(pastEvents);
  for (var i = 0; i < all.length; i++) { if (all[i].id === id) return all[i]; }
  return null;
}

function eCardHtml(e) {
  var rsvpBtn = '';
  if (e.rsvp) {
    if (e.going) {
      rsvpBtn = '<button class="btn btn-sm btn-g on" onclick="event.stopPropagation();cancelRsvp(' + e.id + ')">' +
        (e.userRole ? '✓ ' + e.userRole : '✓ Katiliyorum') + '</button>';
    } else {
      rsvpBtn = '<button class="btn btn-sm btn-g" onclick="event.stopPropagation();rsvpT(' + e.id + ')">Katil</button>';
    }
  }
  return '<div class="ecard" onclick="openEvDetail(' + e.id + ')">' +
    '<div class="ehead" style="background:linear-gradient(135deg,' + e.cols[0] + '22,' + (e.cols[1]||e.cols[0]) + '33)">' +
      '<span class="ehead-em">' + e.em + '</span>' +
      '<span class="etag">' + e.type + '</span>' +
      (e.rsvp ? '<span class="ersvp eo">RSVP</span>' : '<span class="ersvp ec">Serbest</span>') +
    '</div>' +
    '<div class="ebody"><div class="ename">' + e.name + '</div>' +
      '<div class="emeta">📅 ' + e.date + ' · ⏰ ' + e.time + '</div>' +
      '<div class="emeta">📍 ' + e.loc + '</div>' +
    '</div>' +
    '<div class="efooter">' +
      '<div class="pips">' + e.pips.map(function(p,j){ return '<div class="pip" style="background:' + e.cols[j%e.cols.length] + '">' + p + '</div>'; }).join('') + '</div>' +
      rsvpBtn +
    '</div>' +
  '</div>';
}

function cancelRsvp(id) {
  var e = getEvById(id);
  if (!e) return;
  e.going = false;
  e.userRole = null;
  if (curPage === 'events') pgEvents();
  if (curPage === 'dashboard') pgDashboard();
  showToast('Katilim iptal edildi');
}

function pgEvents() {
  setTop('');
  var tabs = '<div class="ev-tabs">' +
    '<div class="ev-tab' + (evTab==='current'?' active':'') + '" onclick="evTab=\'current\';pgEvents()">🎭 Guncel Etkinlikler</div>' +
    '<div class="ev-tab' + (evTab==='past'?' active':'') + '" onclick="evTab=\'past\';pgEvents()">📚 Gecmis Etkinlikler</div>' +
  '</div>';

  if (evTab === 'current') {
    var cards = '';
    for (var i = 0; i < events.length; i++) cards += eCardHtml(events[i]);
    setMC(tabs + '<div class="g3">' + cards + '</div>');
    return;
  }

  /* PAST — filtered list */
  var years = [];
  for (var i = 0; i < pastEvents.length; i++) {
    if (years.indexOf(pastEvents[i].year) < 0) years.push(pastEvents[i].year);
  }
  years.sort(function(a,b){ return b-a; });

  var yearPills = '<button class="fpill' + (evFilterYear==='Tumu'?' on':'') + '" onclick="evFilterYear=\'Tumu\';pgEvents()">Tumu</button>';
  for (var i = 0; i < years.length; i++) {
    yearPills += '<button class="fpill' + (evFilterYear===years[i]?' on':'') + '" onclick="evFilterYear=' + years[i] + ';pgEvents()">' + years[i] + '</button>';
  }

  var tagPills =
    '<button class="fpill' + (evFilterTag==='Tumu'?' on':'') + '" onclick="evFilterTag=\'Tumu\';pgEvents()">Tumu</button>' +
    '<button class="fpill fc-fosil' + (evFilterTag==='Fosil'?' on':'') + '" onclick="evFilterTag=\'Fosil\';pgEvents()">Fosil</button>' +
    '<button class="fpill fc-caylak' + (evFilterTag==='Caylak'?' on':'') + '" onclick="evFilterTag=\'Caylak\';pgEvents()">Caylak</button>';

  var venueOpts = '';
  for (var i = 0; i < VENUES.length; i++) {
    venueOpts += '<option value="' + VENUES[i] + '"' + (evFilterVenue===VENUES[i]?' selected':'') + '>' + VENUES[i] + '</option>';
  }
  var venueSelect = '<select class="fsel" onchange="evFilterVenue=this.value;pgEvents()">' + venueOpts + '</select>';

  var filters =
    '<div class="card mb" style="padding:14px 16px">' +
      '<div class="ev-filters" style="margin-bottom:10px">' +
        '<span class="ev-filter-label">Yil</span>' + yearPills +
      '</div>' +
      '<div class="ev-filters" style="margin-bottom:10px">' +
        '<span class="ev-filter-label">Etiket</span>' + tagPills +
      '</div>' +
      '<div class="ev-filters" style="margin-bottom:0">' +
        '<span class="ev-filter-label">Mekan</span>' + venueSelect +
      '</div>' +
    '</div>';

  var filtered = pastEvents.filter(function(e) {
    if (evFilterYear !== 'Tumu' && e.year !== evFilterYear) return false;
    if (evFilterTag !== 'Tumu' && e.tag !== evFilterTag) return false;
    if (evFilterVenue !== 'Tumu' && e.venue !== evFilterVenue) return false;
    return true;
  });

  var listHtml = '';
  if (filtered.length === 0) {
    listHtml = '<div style="text-align:center;padding:40px;color:var(--muted)">Bu filtreye uyan etkinlik bulunamadi.</div>';
  } else {
    for (var i = 0; i < filtered.length; i++) {
      var e = filtered[i];
      var attBadge = e.attended === true
        ? '<span class="att-badge att-yes">✓ Katildim</span>'
        : (e.attended === false ? '<span class="att-badge att-no">— Katilmadim</span>' : '');
      var mediaCount = e.media && e.media.length > 0 ? '<span class="media-count">📷 ' + e.media.length + '</span>' : '';
      listHtml += '<div class="past-item" onclick="openEvDetail(' + e.id + ')">' +
        '<div class="past-icon" style="background:linear-gradient(135deg,#F5EFE6,#EDE8DF)">' + e.em + '</div>' +
        '<div class="past-info">' +
          '<div class="past-name">' + e.name + '</div>' +
          '<div class="past-meta">' +
            '<span>📅 ' + e.date + '</span>' +
            '<span>📍 ' + e.loc + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="past-badges">' +
          mediaCount +
          '<span class="tag ' + (e.tag==='Fosil'?'t-r':'t-g') + '">' + e.tag + '</span>' +
          attBadge +
          '<span style="color:var(--muted);font-size:18px">›</span>' +
        '</div>' +
      '</div>';
    }
  }
  setMC(tabs + filters + listHtml);
}

function rsvpT(id) {
  var e = getEvById(id);
  if (!e) return;
  if (!e.going && e.roles && e.roles.length > 0) {
    /* has roles — open role picker first */
    openRolePicker(id);
    return;
  }
  e.going = !e.going;
  if (!e.going) e.userRole = null;
  if (curPage === 'events') pgEvents();
  if (curPage === 'dashboard') pgDashboard();
  showToast(e.going ? 'Katiliniz kaydedildi ✓' : 'Katilim iptal edildi');
}

function openRolePicker(id) {
  var e = getEvById(id);
  if (!e) return;
  var pickedRole = e.userRole || null;
  var roleButtons = '';
  for (var i = 0; i < e.roles.length; i++) {
    var r = e.roles[i];
    roleButtons += '<button class="role-btn' + (pickedRole===r?' picked':'') + '" onclick="pickRole(' + id + ',\'' + r + '\')">' + r + '</button>';
  }
  document.getElementById('mcon').innerHTML =
    '<div style="text-align:center;padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px">' +
      '<div style="font-size:40px;margin-bottom:6px">' + e.em + '</div>' +
      '<div style="font-family:\'Playfair Display\',serif;font-size:17px;font-weight:700">' + e.name + '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-top:4px">📅 ' + e.date + ' · 📍 ' + e.loc + '</div>' +
    '</div>' +
    '<div style="font-weight:700;font-size:14px;margin-bottom:4px">Bu etkinlikteki rolunuz nedir?</div>' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:0">Katilinizi teyit etmek icin rolunuzu secin.</div>' +
    '<div class="role-grid" id="roleGrid_' + id + '">' + roleButtons + '</div>' +
    '<button class="sbtn" id="roleConfirmBtn" style="' + (pickedRole ? '' : 'opacity:.4;pointer-events:none') + '" onclick="confirmRole(' + id + ')">' +
      (pickedRole ? '✓ ' + pickedRole + ' olarak Katilacagim' : 'Once bir rol secin') +
    '</button>' +
    '<button class="btn btn-s" style="width:100%;justify-content:center;border-radius:12px;margin-top:8px" onclick="openEvDetail(' + id + ')">Geri</button>';
  showModal();
}

function pickRole(id, role) {
  var e = getEvById(id);
  if (!e) return;
  e.userRole = role;
  /* refresh role buttons */
  var btns = document.querySelectorAll('#roleGrid_' + id + ' .role-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('picked', btns[i].textContent === role);
  }
  var confirmBtn = document.getElementById('roleConfirmBtn');
  if (confirmBtn) {
    confirmBtn.textContent = '✓ ' + role + ' olarak Katilacagim';
    confirmBtn.style.opacity = '1';
    confirmBtn.style.pointerEvents = 'auto';
  }
}

function confirmRole(id) {
  var e = getEvById(id);
  if (!e || !e.userRole) return;
  e.going = true;
  if (curPage === 'events') pgEvents();
  if (curPage === 'dashboard') pgDashboard();
  showToast('✓ ' + e.userRole + ' olarak katiliniz kaydedildi');
  openEvDetail(id); /* refresh detail view */
}

function toggleAttended(id, val) {
  var e = getEvById(id);
  if (!e) return;
  e.attended = (e.attended === val) ? null : val;
  openEvDetail(id); /* refresh modal */
}

function addMedia(id) {
  var e = getEvById(id);
  if (!e) return;
  if (!e.media) e.media = [];
  if (e.media.length >= 5) { showToast('En fazla 5 medya yukleyebilirsiniz'); return; }
  var types = [['📸','Fotograf ' + (e.media.length+1),'photo'],['🎬','Video ' + (e.media.length+1),'video']];
  var pick = types[Math.floor(Math.random() * types.length)];
  e.media.push({t:pick[2], ic:pick[0], n:pick[1]});
  openEvDetail(id);
  showToast(pick[0] + ' yuklendi ✓');
}

function delMedia(id, idx) {
  var e = getEvById(id);
  if (!e || !e.media) return;
  e.media.splice(idx, 1);
  openEvDetail(id);
}

function openEvDetail(id) {
  var e = getEvById(id);
  if (!e) return;
  var isPast = e.year < CURRENT_YEAR;

  /* info grid */
  var infoGrid = [['📅 Tarih',e.date],['⏰ Saat',e.time],['📍 Mekan',e.loc],
    isPast ? ['📂 Arsiv',e.year + ' Arsivi'] : ['🎟 RSVP', e.rsvp?'Acik':'Serbest']];
  var infoHtml = '';
  for (var i = 0; i < infoGrid.length; i++) {
    infoHtml += '<div style="background:var(--cream);border-radius:10px;padding:11px">' +
      '<div style="font-size:10px;color:var(--muted);margin-bottom:2px">' + infoGrid[i][0] + '</div>' +
      '<div style="font-weight:700;font-size:13px">' + infoGrid[i][1] + '</div>' +
    '</div>';
  }

  /* tags row */
  var tagsHtml = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">' +
    '<span class="tag ' + (e.tag==='Fosil'?'t-r':'t-g') + '">' + e.tag + '</span>' +
    '<span class="tag t-b">' + e.type + '</span>' +
    (e.venue ? '<span class="tag" style="background:var(--tag-bg);color:var(--muted)">📍 ' + e.venue + '</span>' : '') +
  '</div>';

  /* attendance or RSVP section */
  var actionHtml = '';
  if (isPast) {
    actionHtml = '<div style="margin-bottom:16px">' +
      '<div style="font-weight:700;font-size:13px;margin-bottom:8px">Bu etkinlige katildiniz mi?</div>' +
      '<div class="att-toggle">' +
        '<button class="att-btn yes' + (e.attended===true?' on':'') + '" onclick="toggleAttended(' + e.id + ',true)">✓ Katildim</button>' +
        '<button class="att-btn no' + (e.attended===false?' on':'') + '" onclick="toggleAttended(' + e.id + ',false)">— Katilmadim</button>' +
      '</div>' +
    '</div>';
  } else if (e.rsvp) {
    var att = members.filter(function(m){ return m.status==='active'; }).slice(0,4);
    var attHtml = '';
    for (var i = 0; i < att.length; i++) {
      var m = att[i];
      /* simulate a random role for demo attendees */
      var demoRole = e.roles ? e.roles[i % e.roles.length] : null;
      attHtml += '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">' +
        '<div class="av" style="width:30px;height:30px;background:' + m.col + '">' + m.init + '</div>' +
        '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + m.name + '</div></div>' +
        (demoRole ? '<span class="role-badge">' + demoRole + '</span>' : '<span class="pill p-g" style="font-size:10px">Katiliyor</span>') +
      '</div>';
    }
    /* Show user's current role if registered */
    var myRoleHtml = '';
    if (e.going && e.userRole) {
      myRoleHtml = '<div style="background:#EAFAF1;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px">' +
        '<span style="font-size:18px">✓</span>' +
        '<div><div style="font-weight:700;font-size:13px;color:var(--green)">Kaydiniz alindi</div>' +
          '<div style="font-size:12px;color:var(--green)">Roliniz: <strong>' + e.userRole + '</strong></div>' +
        '</div>' +
      '</div>';
    }
    var rsvpBtnLabel = e.going
      ? (e.userRole ? 'Rolumu Degistir / Iptal Et' : 'Katilinizi Iptal Et')
      : (e.roles && e.roles.length > 0 ? '🎭 Rol Sec ve Katil' : '✓ Katilacagim');
    actionHtml = myRoleHtml +
      '<div style="margin-bottom:12px"><div style="font-weight:700;font-size:13px;margin-bottom:10px">Katilimcilar (' + att.length + ')</div>' + attHtml + '</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:16px">' +
        '<button class="sbtn" style="flex:1;margin-top:0" onclick="' +
          (e.going ? 'cancelRsvp(' + e.id + ');openEvDetail(' + e.id + ')' : 'closeModal();rsvpT(' + e.id + ')') +
        '">' + rsvpBtnLabel + '</button>' +
        (isAdmin ? '<button class="wa-btn" style="padding:10px 14px;white-space:nowrap;margin-top:0" onclick="showToast(\'WhatsApp mesaji hazirlandi!\')">📲</button>' : '') +
      '</div>';
  } else {
    actionHtml = '<p style="color:var(--muted);text-align:center;font-size:13px;padding:14px 0 16px">Bu etkinlik icin RSVP gerekmez.</p>';
  }

  /* media gallery */
  var media = e.media || [];
  var mediaHtml = '';
  for (var i = 0; i < media.length; i++) {
    var m = media[i];
    mediaHtml += '<div class="mg-item">' +
      '<span>' + m.ic + '</span>' +
      '<div class="mg-lbl">' + m.n + '</div>' +
      '<button class="mg-del" onclick="event.stopPropagation();delMedia(' + e.id + ',' + i + ')">x</button>' +
    '</div>';
  }
  var remaining = 5 - media.length;
  if (remaining > 0) {
    mediaHtml += '<div class="upload-slot" onclick="addMedia(' + e.id + ')">' +
      '<span>＋</span>' +
      '<div class="us-lbl">Fotograf / Video<br>(' + remaining + ' hakkiniz var)</div>' +
    '</div>';
  }

  /* admin tools */
  var adminHtml = isAdmin ? '<div style="border-top:1px solid var(--border);margin-top:14px;padding-top:12px">' +
    '<div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px">YONETICI</div>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      '<button class="abtn" onclick="showToast(\'Davet gonderildi!\')">✉ Davet Gonder</button>' +
      '<button class="abtn" onclick="showToast(\'Duyuru yapildi!\')">📢 Duyuru Yap</button>' +
      '<button class="abtn" onclick="showToast(\'Liste indirildi!\')">⬇ Liste Indir</button>' +
    '</div></div>' : '';

  document.getElementById('mcon').innerHTML =
    '<div style="text-align:center;padding:10px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px">' +
      '<div style="font-size:48px;margin-bottom:8px">' + e.em + '</div>' +
      '<div class="mtitle" style="margin-bottom:8px">' + e.name + '</div>' +
      tagsHtml +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">' + infoHtml + '</div>' +
    actionHtml +
    '<div style="border-top:1px solid var(--border);padding-top:14px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
        '<div style="font-weight:700;font-size:13px">📷 Fotograf ve Video Arsivi</div>' +
        '<span style="font-size:11px;color:var(--muted)">' + media.length + '/5 medya</span>' +
      '</div>' +
      '<div class="media-gallery">' + mediaHtml + '</div>' +
    '</div>' +
    adminHtml;
  showModal();
}

/* BOARD */
var bdTab = 'fosil';
var bdOpenPast = {}; /* {idx: bool} expanded past periods */
var bdOpenDiger = {}; /* {key: bool} expanded diger categories */

function pgBoard() {
  setTop('');
  var isFosil = bdTab === 'fosil';
  var grp = isFosil ? boardData.fosil : boardData.caylak;
  var tabs = '<div class="btab-wrap">' +
    '<div class="btab' + (bdTab==='fosil'?' active':'') + '" onclick="bdTab=\'fosil\';bdOpenPast={};bdOpenDiger={};pgBoard()">🦅 Fosiller</div>' +
    '<div class="btab' + (bdTab==='caylak'?' active':'') + '" onclick="bdTab=\'caylak\';bdOpenPast={};bdOpenDiger={};pgBoard()">🌱 Caylaklar</div>' +
  '</div>';

  /* Current period (first) */
  var cur = grp.donemler[0];
  var isCaylak = !isFosil;
  var agaLabel = isCaylak ? (cur.basklik || 'Baskan') : 'Donem Agasi';
  var marabaLabel = isCaylak ? 'Yonetim Kurulu Uyeleri' : 'Marabalar';

  /* Avatar initials helper */
  function initials(name) {
    var p = name.split(' ');
    return (p[0][0] + (p[1]?p[1][0]:'')).toUpperCase();
  }
  /* Color from string */
  var COLS = ['#C0392B','#27AE60','#E67E22','#7986CB','#8E44AD','#16A085','#D35400','#1A5276','#7D3C98','#148F77'];
  function getCol(name) { var h=0; for(var i=0;i<name.length;i++)h+=name.charCodeAt(i); return COLS[h%COLS.length]; }

  /* Build current period */
  var curHtml = '';

  /* Aga card */
  var agaBg = 'linear-gradient(135deg,' + (cur.aga.col||'#7B241C') + ',' + (cur.aga.col||'#7B241C') + 'aa)';
  curHtml += '<div class="aga-card" style="background:' + agaBg + '" onclick="toggleBdOpen(\'cur\')">' +
    '<div class="aga-period">Guncel · ' + cur.donem + '</div>' +
    '<div class="aga-title">' + agaLabel + '</div>' +
    '<div class="aga-name">' + cur.aga.name + '</div>' +
    '<div class="aga-meta">' +
      '<span>' + logoImg(THBT_LOGO) + cur.aga.thbtGiris + ' girisi</span>' +
      (cur.aga.odtuMez ? '<span>' + logoImg(ODTU_LOGO) + cur.aga.odtuMez + ' mezun</span>' : '') +
      '<span>📍 ' + cur.aga.sehir + '</span>' +
    '</div>' +
    '<div class="aga-expand"><span id="aga-chev">▼</span> ' + marabaLabel + ' (' + cur.marabalar.length + ' kisi)</div>' +
  '</div>';

  /* Marabalar (always visible for current) */
  curHtml += '<div class="card mb" id="aga-marabalar">' +
    '<div class="card-hd">' + marabaLabel + ' <span style="font-size:12px;color:var(--muted);font-weight:400">(' + cur.marabalar.length + ' kisi)</span></div>';
  for (var i = 0; i < cur.marabalar.length; i++) {
    var m = cur.marabalar[i];
    var mc = getCol(m.name);
    curHtml += '<div class="maraba-row">' +
      '<div class="maraba-av" style="width:38px;height:38px;background:' + mc + '">' + initials(m.name) + '</div>' +
      '<div style="flex:1">' +
        '<div class="maraba-name">' + m.name + '</div>' +
        '<div class="maraba-meta">' + logoImg(THBT_LOGO) + m.thbtGiris + (m.odtuMez ? ' &nbsp;' + logoImg(ODTU_LOGO) + m.odtuMez : '') + '</div>' +
        '<div class="maraba-meta">📍 ' + m.sehir + '</div>' +
      '</div>' +
      '<span class="maraba-role">' + m.sorumluluk + '</span>' +
    '</div>';
  }
  curHtml += '</div>';

  /* Diger sorumlular */
  curHtml += '<div style="margin-bottom:16px">' +
    '<div style="font-weight:700;font-size:14px;margin-bottom:8px;color:var(--muted)">Diger Sorumlular</div>';
  for (var i = 0; i < cur.diger.length; i++) {
    var d = cur.diger[i];
    var dKey = bdTab + '_cur_' + i;
    var isOpen = !!bdOpenDiger[dKey];
    curHtml += '<div class="diger-accordion">' +
      '<div class="diger-hdr" onclick="toggleDiger(\'' + dKey + '\')">' +
        '<span>' + d.kategori + ' <span style="color:var(--muted);font-weight:400;font-size:12px">(' + d.uyeler.length + ' kisi)</span></span>' +
        '<span id="dc_' + dKey + '">' + (isOpen?'▲':'▼') + '</span>' +
      '</div>' +
      '<div class="diger-body' + (isOpen?'':' cl') + '" id="db_' + dKey + '">' +
        d.uyeler.map(function(u){
          return '<div class="diger-member">' +
            '<div class="av" style="width:28px;height:28px;font-size:11px;background:' + getCol(u.name) + '">' + initials(u.name) + '</div>' +
            '<span style="font-weight:600">' + u.name + '</span>' +
            '<span style="color:var(--muted);font-size:12px;margin-left:auto">Giris: ' + u.thbtGiris + '</span>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }
  curHtml += '</div>';

  /* Past periods */
  var pastHtml = '<div style="font-weight:700;font-size:14px;margin-bottom:10px;color:var(--muted)">Gecmis Donemler</div>';
  for (var pi = 1; pi < grp.donemler.length; pi++) {
    var pd = grp.donemler[pi];
    var pKey = bdTab + '_past_' + pi;
    var pOpen = !!bdOpenPast[pKey];
    var marabaHtml = '';
    if (pOpen) {
      for (var mi = 0; mi < pd.marabalar.length; mi++) {
        var pm = pd.marabalar[mi];

function renderMemTable() {
  var active = members.filter(function(m) { return m.status === 'active'; });
  var filtered = active.filter(function(m) {
    if (memSearch && m.name.toLowerCase().indexOf(memSearch.toLowerCase()) < 0) return false;
    if (memFilterCity !== 'Tumu' && m.city !== memFilterCity) return false;
    if (memFilterYear !== 'Tumu' && (!m.thbtEntry || m.thbtEntry.substring(0,4) !== memFilterYear)) return false;
    if (memFilterArea !== 'Tumu') {
      var a = m.oyunlar.concat(m.enstru).concat(m.muzik).concat(m.birimler);
      if (a.indexOf(memFilterArea) < 0) return false;
    }
    return true;
  });
  filtered.sort(function(a,b) {
    if (memSort === 'name-asc') return a.name.localeCompare(b.name);
    if (memSort === 'name-desc') return b.name.localeCompare(a.name);
    if (memSort === 'year-asc') return a.thbtEntry.localeCompare(b.thbtEntry);
    return b.thbtEntry.localeCompare(a.thbtEntry);
  });
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total / MEM_PER_PAGE));
  if (memPage > totalPages) memPage = totalPages;
  var paged = filtered.slice((memPage-1)*MEM_PER_PAGE, memPage*MEM_PER_PAGE);
  var hd = document.getElementById('memTableHd');
  if (hd) hd.textContent = 'Tum Uyeler (' + total + (total !== active.length ? '/' + active.length : '') + ')';
  if (total === 0) {
    document.getElementById('memTableBody').innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">Sonuc bulunamadi.</div>';
    document.getElementById('memPager').innerHTML = '';
    return;
  }
  var rows = '';
  for (var i = 0; i < paged.length; i++) {
    var m = paged[i];
    var tags = m.oyunlar.map(function(o){ return '<span class="tag t-o" style="font-size:10px;padding:2px 6px;margin:1px">' + o + '</span>'; }).join('') +
      m.enstru.map(function(e){ return '<span class="tag t-b" style="font-size:10px;padding:2px 6px;margin:1px">' + e + '</span>'; }).join('') +
      m.muzik.map(function(mu){ return '<span class="tag t-g" style="font-size:10px;padding:2px 6px;margin:1px">' + mu + '</span>'; }).join('') +
      m.birimler.map(function(b){ return '<span class="tag t-r" style="font-size:10px;padding:2px 6px;margin:1px">' + b + '</span>'; }).join('');
    rows += '<tr>' +
      '<td><div style="display:flex;align-items:center;gap:9px"><div class="av" style="width:32px;height:32px;font-size:11px;background:' + m.col + '">' + m.init + '</div>' +
        '<div><div style="font-weight:700;font-size:13px">' + m.name + '</div><div style="font-size:10px;color:var(--muted)">' + m.type + '</div></div></div></td>' +
      '<td style="font-size:12px;white-space:nowrap">' + m.city + '<br><span style="color:var(--muted);font-size:11px">' + m.country + '</span></td>' +
      '<td style="font-size:12px;white-space:nowrap">' + logoImg(THBT_LOGO) + ' ' + fmtM(m.thbtEntry) + (m.odtuGrad ? '<br>' + logoImg(ODTU_LOGO) + ' ' + fmtM(m.odtuGrad) : '') + '</td>' +
      '<td style="font-size:12px;max-width:110px">' + (m.dept || '-') + '</td>' +
      '<td style="font-size:12px;max-width:110px">' + (m.employer || '-') + '</td>' +
      '<td><div style="display:flex;flex-wrap:wrap;max-width:200px">' + tags + '</div></td>' +
      '<td><span class="pill ' + (m.weekly ? 'p-g' : 'p-y') + '" style="white-space:nowrap">' + (m.weekly ? 'Aktif' : 'Pasif') + '</span></td>' +
    '</tr>';
  }
  document.getElementById('memTableBody').innerHTML =
    '<div style="overflow-x:auto"><table class="tbl">' +
      '<thead><tr><th>Uye</th><th>Sehir</th><th>Yillar</th><th>Bolum</th><th>Kurum</th><th>Aktif Alanlar</th><th>Haftalik</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
  if (totalPages <= 1) { document.getElementById('memPager').innerHTML = ''; return; }
  var pg = '<div style="display:flex;align-items:center;justify-content:center;gap:5px;padding-top:14px;border-top:1px solid var(--border);margin-top:10px;flex-wrap:wrap">';
  pg += '<button class="sort-btn" onclick="if(memPage>1){memPage--;renderMemTable()}" ' + (memPage===1?'disabled style="opacity:.4"':'') + '>&#8249; Onceki</button>';
  for (var p = 1; p <= totalPages; p++) {
    pg += '<button class="sort-btn' + (p===memPage?' on':'') + '" onclick="memPage=' + p + ';renderMemTable()">' + p + '</button>';
  }
  pg += '<button class="sort-btn" onclick="if(memPage<' + totalPages + '){memPage++;renderMemTable()}" ' + (memPage===totalPages?'disabled style="opacity:.4"':'') + '>Sonraki &#8250;</button>';
  pg += '<span style="font-size:12px;color:var(--muted);margin-left:4px">' + memPage + '/' + totalPages + '</span></div>';
  document.getElementById('memPager').innerHTML = pg;
}

/* Admin actions */
function adminApprove(id) {
  var m = members.find ? members.find(function(x){ return x.id===id; }) : null;
  if (!m) { for(var i=0;i<members.length;i++) if(members[i].id===id){m=members[i];break;} }
  if (m) { m.status='active'; showToast(m.name + ' onaylandi ✓'); pgProfile(); }
}
function adminReject(id) {
  for (var i=0;i<members.length;i++) {
    if(members[i].id===id){ members.splice(i,1); showToast('Uye reddedildi'); pgProfile(); return; }
  }
}
function adminSetRole(id, role) {
  for (var i=0;i<members.length;i++) { if(members[i].id===id){ members[i].appRole=role; showToast('Yetki guncellendi: '+role); return; } }
}
function adminCreateEvent() {
  var name = document.getElementById('adm_ename').value.trim();
  if (!name) { showToast('Etkinlik adi gerekli'); return; }
  var rolesRaw = document.getElementById('adm_roles').value;
  var roles = rolesRaw ? rolesRaw.split(',').map(function(r){ return r.trim(); }).filter(Boolean) : null;
  var newEv = {
    id: Date.now(), name: name,
    type: document.getElementById('adm_etype').value,
    em: '🎭', date: document.getElementById('adm_edate').value || 'TBD',
    month: new Date().getMonth()+1, year: 2025,
    time: document.getElementById('adm_etime').value,
    loc: document.getElementById('adm_eloc').value,
    venue: document.getElementById('adm_eloc').value,
    rsvp: document.getElementById('adm_rsvp').checked,
    going: false, userRole: null,
    tag: document.getElementById('adm_etag').value,
    pips: [], cols: ['#7986CB'],
    media: [], attended: null, roles: roles
  };
  events.push(newEv);
  showToast('Etkinlik olusturuldu ✓');
  pfTab='admin'; pgProfile();
}
function adminDelWeekly(idx) {
  if (confirm ? confirm('Bu calismay? kaldirmak istediginizden emin misiniz?') : true) {
    weekly.splice(idx, 1); showToast('Calisma kaldirildi'); pfTab='admin'; pgProfile();
  }
}
function adminAddWeekly() {
  var day = document.getElementById('wk_day').value;
  var time = document.getElementById('wk_time').value;
  var name = document.getElementById('wk_name').value.trim();
  var city = document.getElementById('wk_city').value.trim();
  if (!name || !city) { showToast('Ad ve sehir gerekli'); return; }
  var dayFull = {Pzt:'Pazartesi',Sal:'Sali',Car:'Carsamba',Per:'Persembe',Cum:'Cuma',Cmt:'Cumartesi',Paz:'Pazar'}[day]||day;
  weekly.push({day:day, full:dayFull, time:time, name:name, city:city, type:'Diger', col:'#7986CB', ic:'🎵'});
  showToast('Programa eklendi ✓'); pfTab='admin'; pgProfile();
}
function adminUploadMedia() {
  var evId = parseInt(document.getElementById('adm_mev').value);
  var e = null;
  var all = events.concat(pastEvents);
  for(var i=0;i<all.length;i++) if(all[i].id===evId){e=all[i];break;}
  if (!e) return;
  if (!e.media) e.media=[];
  var count = Math.min(3, 5-e.media.length);
  if (count <= 0) { showToast('Bu etkinlik dolu (max 5)'); return; }
  for(var i=0;i<count;i++) e.media.push({t:'photo',ic:'📸',n:'Yuklenen Fotograf '+(e.media.length+1)});
  showToast(count + ' medya yuklendi ✓');
}
function adminSendAnn(type) {
  var title = document.getElementById('ann_title').value.trim();
  var msg = document.getElementById('ann_msg').value.trim();
  if (!title || !msg) { showToast('Baslik ve mesaj gerekli'); return; }
  if (type === 'popup') {
    showToast('📢 Bildirim gonderildi: ' + title);
    announcements.unshift({title:title, text:msg, date:'Bugun', icon:'📢', bg:'#FDEDEC', wa:false});
  } else {
    var waMsg = title + '\n\n' + msg;
    window.open('https://wa.me/?text=' + encodeURIComponent(waMsg), '_blank');
    showToast('WhatsApp aciliyor...');
  }
}
function adminDelEvent(id) {
  for(var i=0;i<events.length;i++) {
    if(events[i].id===id){ events.splice(i,1); showToast('Etkinlik silindi'); pfTab='admin'; pgProfile(); return; }
  }
}
function adminDeactivate(id) {
  for(var i=0;i<members.length;i++) {
    if(members[i].id===id){ members[i].status='inactive'; showToast(members[i].name+' pasife alindi'); pfTab='admin'; pgProfile(); return; }
  }
}
function adminDeleteMem(id) {
  for(var i=0;i<members.length;i++) {
    if(members[i].id===id){ var n=members[i].name; members.splice(i,1); showToast(n+' silindi'); pfTab='admin'; pgProfile(); return; }
  }
}

function togglePf(id) {
  var b = document.getElementById('pb_' + id), c = document.getElementById('pc_' + id);
  if (!b || !c) return;
  var cl = b.classList.toggle('cl');
  c.textContent = cl ? '▼' : '▲';
}
function togT(el, key) {
  el.classList.toggle('sel');
  var count = document.querySelectorAll('#tp_' + key + ' .sel').length;
  var tc = document.getElementById('tc_' + key);
  if (tc) tc.textContent = count + ' secili';
}
function updW() {
  var on = document.getElementById('pf_weekly').checked;
  var lbl = document.getElementById('wlbl');
  if (lbl) lbl.textContent = on ? 'Aktif Katilimci' : 'Katilamiyor';
}
function saveProfile() {
  var get = function(id){ var el=document.getElementById(id); return el?el.value:null; };
  if(get('pf_name')) UP.name=get('pf_name');
  if(get('pf_phone')) UP.phone=get('pf_phone');
  if(get('pf_city')) UP.city=get('pf_city');
  if(get('pf_country')) UP.country=get('pf_country');
  if(get('pf_dept')) UP.dept=get('pf_dept');
  if(get('pf_employer')) UP.employer=get('pf_employer');
  if(get('pf_entry')) UP.thbtEntry=get('pf_entry');
  if(get('pf_grad')) UP.odtuGrad=get('pf_grad');
  if(get('pf_type')) UP.memberType=get('pf_type');
  var w=document.getElementById('pf_weekly'); if(w) UP.weeklyActive=w.checked;
  var h=document.querySelectorAll('#tp_halkOyunlari .sel'); UP.halkOyunlari=[];
  for(var i=0;i<h.length;i++) UP.halkOyunlari.push(h[i].textContent);
  var en=document.querySelectorAll('#tp_enstru .sel'); UP.enstru=[];
  for(var i=0;i<en.length;i++) UP.enstru.push(en[i].textContent);
  var mz=document.querySelectorAll('#pb_muzik .cbcard.on label'); UP.muzikalAktiviteler=[];
  for(var i=0;i<mz.length;i++) UP.muzikalAktiviteler.push(mz[i].textContent);
  var br=document.querySelectorAll('#pb_birim .cbcard.on label'); UP.aktifBirimler=[];
  for(var i=0;i<br.length;i++) UP.aktifBirimler.push(br[i].textContent);
  pgProfile();
  showToast('Profil guncellendi ✓');
}

    '<div class="fg"><label class="fl">Soyad</label><input class="fi" id="inv_last" placeholder="Soyad" oninput="checkInvName()"></div>' +

function checkInvName() {
  var first = (document.getElementById('inv_first').value || '').trim();
  var last = (document.getElementById('inv_last').value || '').trim();
  var full = (first + ' ' + last).toLowerCase().trim();
  var warn = document.getElementById('inv_warning');
  var matched = full.length > 2 && members.some(function(m) {
    return m.name.toLowerCase().indexOf(full) >= 0 || full.indexOf(m.name.toLowerCase()) >= 0;
  });
  if (warn) warn.classList.toggle('show', matched);
  updateInvPreview();
}

function updateInvPreview() {
  var first = (document.getElementById('inv_first') && document.getElementById('inv_first').value || '').trim();
  var last = (document.getElementById('inv_last') && document.getElementById('inv_last').value || '').trim();
  var phone = (document.getElementById('inv_phone') && document.getElementById('inv_phone').value || '').trim();
  var prev = document.getElementById('inv_preview');
  if (!prev) return;
  if (first || last) {
    var name = (first + ' ' + last).trim();
    prev.innerHTML = '<strong>Mesaj onizlemesi:</strong><br><br>' +
      'Merhaba ' + name + ',<br><br>' +
      'Sizi THBT Mezunlar platformuna davet etmek istiyorum! Toplulugumuzun etkinliklerini takip edebilir, eski dostlarla yeniden baglantiya gecebilirsiniz.<br><br>' +
      '<em>Kayit linki: thbt-mezunlar.netlify.app</em>';
  } else {
    prev.textContent = 'Ad ve telefon girdikten sonra davet mesaji onizlemesi burada gorunecek.';
  }
}

function sendWhatsApp() {
  var first = (document.getElementById('inv_first').value || '').trim();
  var last = (document.getElementById('inv_last').value || '').trim();
  var phone = (document.getElementById('inv_phone').value || '').replace(/\s/g,'');
  if (!first && !last) { showToast('Lutfen ad ve soyad girin'); return; }
  if (!phone) { showToast('Lutfen telefon numarasi girin'); return; }
  var name = (first + ' ' + last).trim();
  var msg = 'Merhaba ' + name + '! Sizi THBT Mezunlar platformuna davet etmek istiyorum. Etkinlikleri takip edebilir, eski dostlarla yeniden baglantiya gecebilirsiniz. Kayit: https://thbt-mezunlar.netlify.app';
  var cleanPhone = phone.replace(/[^0-9+]/g,'');
  window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(msg), '_blank');
  showToast('WhatsApp aciliyor ✓');
}

function copyInvLink() {
  var first = (document.getElementById('inv_first') && document.getElementById('inv_first').value || '').trim();
  var last = (document.getElementById('inv_last') && document.getElementById('inv_last').value || '').trim();
  var name = (first + ' ' + last).trim();
  var link = 'Merhaba' + (name?' '+name:'') + '! THBT Mezunlar platformuna davet edildiniz: https://thbt-mezunlar.netlify.app';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(link).then(function() { showToast('Davet linki kopyalandi ✓'); });
  } else {
    showToast('Davet linki kopyalandi ✓');
  }
}

function showAllSess() {
  var html = '<div class="mtitle">📅 Tum Haftalık Calismalar</div>';
  for (var i = 0; i < weekly.length; i++) {
    var s = weekly[i];
    html += '<div class="sess">' +
      '<div class="sess-day" style="background:' + s.col + '22;color:' + s.col + ';width:64px">' +
        '<span>' + s.full + '</span><span style="font-size:10px;font-weight:700;opacity:.85">' + s.time + '</span>' +
      '</div>' +
      '<div style="flex:1"><div class="sess-name">' + s.ic + ' ' + s.name + '</div><div class="sess-meta">📍 ' + s.city + ' · ' + s.type + '</div></div>' +
    '</div>';
  }
  document.getElementById('mcon').innerHTML = html;
  showModal();
}
function showModal() { document.getElementById('movl').style.display = 'flex'; }
function closeModal() { document.getElementById('movl').style.display = 'none'; }
function maybeClose(e) { if (e.target === document.getElementById('movl')) closeModal(); }

var toastTimer = null;
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(function(t) { t.remove(); });
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { if (t.parentNode) t.remove(); }, 2800);
}
